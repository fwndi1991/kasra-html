<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>گالری تصاویر | یادبود کسری</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">کسری</a>
      <nav class="nav">
        <a href="biography.html">زندگی‌نامه</a>
        <a href="music.html">آثار</a>
        <a href="gallery.html" class="active">گالری</a>
        <a href="guestbook.html">دفترچه یادبود</a>
      </nav>
      <button class="menu-btn" onclick="toggleMenu()" aria-label="منو">☰</button>
    </div>
    <nav class="mobile-nav" id="mobileNav">
      <a href="index.html">خانه</a>
      <a href="biography.html">زندگی‌نامه</a>
      <a href="music.html">آثار</a>
      <a href="gallery.html" class="active">گالری</a>
      <a href="guestbook.html">دفترچه یادبود</a>
    </nav>
  </header>

  <main class="container" style="padding: 4rem 1rem;">
    <div class="page-header">
      <h1>گالری تصاویر</h1>
      <div class="divider"></div>
      <p>لحظات زیبا و خاطرات فراموش‌نشدنی</p>
    </div>

    <div class="gallery-grid" id="galleryGrid"></div>
  </main>

  <!-- لایت‌باکس -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <button class="lightbox-nav lightbox-next" onclick="nextImage()">‹</button>
    <div class="lightbox-content">
      <div class="lightbox-image" id="lightboxImage">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="80" height="80">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      </div>
      <p class="lightbox-caption" id="lightboxCaption"></p>
    </div>
    <button class="lightbox-nav lightbox-prev" onclick="prevImage()">›</button>
  </div>

  <footer class="footer">
    <p>یادبود کسری — همیشه در قلب‌های ما</p>
    <p>برای حفظ خاطرات و آثار یک هنرمند عزیز</p>
  </footer>

  <script src="js/gallery.js"></script>
  <script src="js/unregister-sw.js"></script>
  <audio id="audioPlayer" preload="metadata"></audio>
  <script src="js/persistent-audio.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
